name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "cursor/**"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PORT: "5173"
      BASE_PATH: "/"
      API_PROXY_TARGET: "http://localhost:5000"
      PUBLIC_SITE_URL: "https://www.primeaxishq.com"
      CORS_ORIGIN: "https://www.primeaxishq.com"
      SANITY_PROJECT_ID: "jyppkgsk"
      SANITY_DATASET: "production"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate API clients
        run: pnpm --filter @workspace/api-spec run codegen

      - name: Check generated files are committed
        run: git diff --exit-code

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build (mirrors Vercel buildCommand)
        run: pnpm run build:vercel
